# The Site Configuration

# Import the theme
theme: jekyll-theme-chirpy

# The language of the webpage
lang: en

timezone: Europe/Lisbon

# jekyll-seo-tag settings
# ↓ --------------------------

title: Bernardo Martins

tagline: Developer

description: >-
  Developer & Student based in Portugal. 
  Focus on Backend, Efficiency, and Modern Systems. Featuring a real-time asset dashboard.

url: "https://bernam07.github.io"

github:
  username: bernam07

twitter:
  username: BernaM07

social:
  name: Bernardo Martins
  email: bernardomartins.dev@gmail.com
  links:
    - https://x.com/BernaM07
    - https://github.com/bernam07
    - https://www.linkedin.com/in/bernardomfm

# Site Verification Settings
webmaster_verifications:
  google:
  bing:
  alexa:
  yandex:
  baidu:
  facebook:

# ↑ --------------------------
# The end of `jekyll-seo-tag` settings

# -----------------------------------------------------------------------------
# Search — kept disabled; the jekyll-theme-chirpy search-index generator plugin
# reads this flag directly, so it stays even though the site has no search UI.
# -----------------------------------------------------------------------------
search:
  enabled: false

# Google Analytics is wired directly in _includes/footer.html (gtag), not via
# a Chirpy analytics.* config key — the custom layout doesn't read this block.

social_preview_image:

# PWA — disabled. Keep just the flag: the theme's PWA asset generator reads it,
# and a previous enabled build is what left a stale service worker in visitors'
# browsers (see assets/js/main.js, which cleans that up).
pwa:
  enabled: false

# The base URL of your site
baseurl: ""

# ------------ The following options are not recommended to be modified ------------------

kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: true
      toc: true
      permalink: /posts/:title/
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - tools
  - README.md
  - LICENSE
